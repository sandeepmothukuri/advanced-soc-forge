title: Suspicious Encoded PowerShell Execution
id: a2fbc6b2-4a3e-41b7-8e6c-2f1d9c0e5a3f
status: production
description: Detects PowerShell with encoded/obfuscated commands — fileless malware, droppers
author: SOC Lab
date: 2024/12/01
tags: [attack.execution, attack.t1059.001, attack.defense_evasion, attack.t1027]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - 'IEX('
      - 'Invoke-Expression'
      - 'DownloadString'
      - 'FromBase64String'
  bypass:
    CommandLine|contains:
      - '-ExecutionPolicy Bypass'
      - '-ep bypass'
      - 'hidden'
  condition: selection or bypass
level: high
