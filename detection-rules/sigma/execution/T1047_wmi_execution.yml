title: WMI Remote Code Execution
id: b3e7c1d4-5a2f-4b9e-c7d2-3f9e1a7c4b2d
status: production
description: Detects WMI usage for remote execution — common APT lateral movement
author: SOC Lab
tags: [attack.execution, attack.t1047, attack.lateral_movement]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - '/node:'
      - 'process call create'
  parent_selection:
    ParentImage|endswith: ['\cmd.exe', '\powershell.exe']
  condition: selection or parent_selection
level: high
