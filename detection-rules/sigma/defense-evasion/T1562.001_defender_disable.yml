title: Windows Defender Disabled
id: j1m5k9l2-3i0h-1j7m-k5l0-1n7m0i5l2j8m
status: production
description: Detects attempts to disable Windows Defender real-time protection
author: SOC Lab
tags: [attack.defense_evasion, attack.t1562.001]
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    CommandLine|contains:
      - 'Set-MpPreference -DisableRealtimeMonitoring $true'
      - 'sc stop WinDefend'
      - 'sc config WinDefend start=disabled'
  selection_reg:
    TargetObject|contains: '\Windows Defender\DisableAntiSpyware'
    Details: 'DWORD (0x00000001)'
  condition: selection_cmd or selection_reg
level: high
