# Nginx Reverse Proxy — SOC Lab Dashboard Gateway
# Routes all SOC tool UIs through a single entry point

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # ── Upstream SOC services ────────────────────────────────────────────────
    upstream opensearch_dashboards { server opensearch-dashboards:5601; }
    upstream dfir_iris             { server dfir-iris:8000; }
    upstream misp                  { server misp:80; }
    upstream velociraptor          { server velociraptor:8889; }
    upstream caldera               { server caldera:8888; }
    upstream stackstorm            { server stackstorm:9101; }
    upstream ai_agents             { server crewai-soc:8000; }
    upstream ws_streamer           { server ws-streamer:8765; }

    # ── SOC Portal (port 80) — index of all dashboards ───────────────────────
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # WebSocket live alert stream
        location /ws/ {
            proxy_pass http://ws_streamer;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # AI Agent API proxy
        location /api/agents/ {
            proxy_pass http://ai_agents/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── OpenSearch Dashboards ── :5601 ────────────────────────────────────────
    server {
        listen 5601;
        location / {
            proxy_pass http://opensearch_dashboards;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
        }
    }

    # ── DFIR-IRIS ── :8000 ───────────────────────────────────────────────────
    server {
        listen 8000;
        location / {
            proxy_pass http://dfir_iris;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── MISP ── :8080 ────────────────────────────────────────────────────────
    server {
        listen 8080;
        client_max_body_size 50m;
        location / {
            proxy_pass http://misp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── Velociraptor ── :8889 ────────────────────────────────────────────────
    server {
        listen 8889;
        location / {
            proxy_pass http://velociraptor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── MITRE Caldera ── :8888 ───────────────────────────────────────────────
    server {
        listen 8888;
        location / {
            proxy_pass http://caldera;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── StackStorm UI ── :9101 ───────────────────────────────────────────────
    server {
        listen 9101;
        location / {
            proxy_pass http://stackstorm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
